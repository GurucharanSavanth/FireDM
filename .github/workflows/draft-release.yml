name: draft-release

on:
  push:
    paths:
      - "firedm/version.py"
      - "pyproject.toml"
      - "scripts/firedm-win.spec"
      - "scripts/windows-build.ps1"
      - ".github/workflows/draft-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,build]"

      - name: Run tests
        run: python -m pytest -q

      - name: Lint maintained seam
        run: >
          python -m ruff check
          firedm/FireDM.py
          firedm/app_paths.py
          firedm/extractor_adapter.py
          firedm/ffmpeg_service.py
          firedm/tool_discovery.py
          firedm/setting.py
          firedm/update.py
          tests

      - name: Build package
        run: python -m build

      - name: Build Windows distribution
        shell: pwsh
        run: .\scripts\windows-build.ps1 -PythonExe (Get-Command python).Source -SkipTests

      - name: Prepare release metadata
        shell: pwsh
        run: |
          $version = python -c "from firedm.version import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_ENV
          "tag=$version" >> $env:GITHUB_ENV
          @"
          # FireDM $version

          Windows portable build generated from `scripts/windows-build.ps1`.

          - Extract the zip.
          - Run `FireDM-GUI.exe` for GUI mode.
          - Run `firedm.exe --help` for CLI mode.
          - `ffmpeg` and Deno remain external runtime tools; FireDM discovers app-local binaries, PATH, then Winget package folders.
          "@ | Set-Content -Encoding utf8 release-body.md

      - name: Create Windows zip
        shell: pwsh
        run: Compress-Archive -Path .\dist\FireDM\* -DestinationPath .\dist\FireDM-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: FireDM-Windows-${{ env.version }}
          path: dist/FireDM-Windows.zip
          if-no-files-found: error

      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create $env:tag
          "dist\FireDM-Windows.zip#FireDM Windows portable zip"
          --draft
          --title "FireDM version $env:version"
          --notes-file release-body.md
          --target $env:GITHUB_SHA
          --repo $env:GITHUB_REPOSITORY
