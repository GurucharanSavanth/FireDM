name: draft-release

on:
  push:
    paths:
      - "firedm/version.py"
      - "pyproject.toml"
      - "scripts/firedm-win.spec"
      - "scripts/windows-build.ps1"
      - ".github/workflows/draft-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,build]"

      - name: Run tests
        run: python -m pytest -q

      - name: Lint maintained seam
        run: >
          python -m ruff check
          firedm/FireDM.py
          firedm/app_paths.py
          firedm/extractor_adapter.py
          firedm/ffmpeg_service.py
          firedm/tool_discovery.py
          firedm/setting.py
          firedm/update.py
          tests

      - name: Build Windows distribution
        shell: pwsh
        run: |
          .\scripts\windows-build.ps1 -PythonExe (Get-Command python).Source -SkipTests -SkipLint -Release
          $version = python -c "from firedm.version import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_ENV
          "tag=$version" >> $env:GITHUB_ENV
          "release_dir=release\FireDM-$version-windows-x64" >> $env:GITHUB_ENV

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: FireDM-Windows-${{ env.version }}
          path: release/FireDM-${{ env.version }}-windows-x64/**
          if-no-files-found: error

      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create $env:tag
          "$env:release_dir\FireDM-$env:version-windows-x64.zip#FireDM Windows portable zip"
          "$env:release_dir\SHA256SUMS.txt#SHA256 checksums"
          "$env:release_dir\release-manifest.json#Release manifest"
          "$env:release_dir\firedm-$env:version-py3-none-any.whl"
          "$env:release_dir\firedm-$env:version.tar.gz"
          --draft
          --title "FireDM version $env:version"
          --notes-file "$env:release_dir\release-body.md"
          --target $env:GITHUB_SHA
          --repo $env:GITHUB_REPOSITORY
