name: draft-release

on:
  push:
    tags:
      - "build-[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]_V*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel. Stable requires signing."
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - beta
          - stable
      arch:
        description: "Windows architecture lane. Only x64 is implemented."
        required: true
        default: "x64"
        type: choice
        options:
          - x64
      build_id:
        description: "Optional explicit build ID, e.g. 20260427_V1."
        required: false
        type: string
      date:
        description: "Optional build date override, e.g. 20260427."
        required: false
        type: string
      publish_release:
        description: "Create/upload the GitHub draft release. False runs dry-run only."
        required: true
        default: false
        type: boolean
      draft:
        description: "Create release as draft."
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as prerelease. Keep true for dev/beta."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,build]"

      - name: Dependency preflight
        run: python scripts/release/check_dependencies.py --arch x64 --channel dev --skip-portable

      - name: Compile source and scripts
        run: python -m compileall firedm scripts

      - name: Run tests
        run: python -m pytest -q

      - name: Lint maintained seam
        run: >
          python -m ruff check
          firedm/FireDM.py
          firedm/app_paths.py
          firedm/extractor_adapter.py
          firedm/ffmpeg_service.py
          firedm/tool_discovery.py
          firedm/setting.py
          firedm/update.py
          tests

      - name: Configure optional signing
        shell: pwsh
        run: |
          if ("${{ secrets.FIREDM_SIGN_CERT_SHA1 }}" -ne "") {
            "FIREDM_SIGNTOOL=signtool.exe" >> $env:GITHUB_ENV
            "FIREDM_SIGN_CERT_SHA1=${{ secrets.FIREDM_SIGN_CERT_SHA1 }}" >> $env:GITHUB_ENV
          }
          if ("${{ vars.FIREDM_SIGN_TIMESTAMP_URL }}" -ne "") {
            "FIREDM_SIGN_TIMESTAMP_URL=${{ vars.FIREDM_SIGN_TIMESTAMP_URL }}" >> $env:GITHUB_ENV
          }

      - name: Build Windows installer lane
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel }}"
          $arch = "${{ inputs.arch }}"
          $buildId = "${{ inputs.build_id }}"
          $date = "${{ inputs.date }}"
          if ([string]::IsNullOrWhiteSpace($channel)) {
            $channel = "stable"
          }
          if ([string]::IsNullOrWhiteSpace($arch)) {
            $arch = "x64"
          }
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $channel = "stable"
            $buildId = $env:GITHUB_REF_NAME -replace '^build-', ''
          }
          if ($channel -eq "stable") {
            $env:FIREDM_REQUIRE_SIGNING = "1"
            "FIREDM_REQUIRE_SIGNING=1" >> $env:GITHUB_ENV
          }

          $args = @("scripts\release\build_windows.py", "--arch", $arch, "--channel", $channel)
          if (-not [string]::IsNullOrWhiteSpace($buildId)) {
            $args += @("--build-id", $buildId)
            if ($env:GITHUB_REF_TYPE -eq "tag") {
              $args += "--allow-overwrite"
            }
          } elseif (-not [string]::IsNullOrWhiteSpace($date)) {
            $args += @("--date", $date)
          }
          python @args

          $manifest = Get-Content "dist\release-manifest.json" | ConvertFrom-Json
          if (-not $manifest.build_id) {
            throw "release manifest missing build_id"
          }
          foreach ($artifact in $manifest.artifacts) {
            if ($artifact.path -notmatch [regex]::Escape($manifest.build_id)) {
              throw "artifact path missing build_id: $($artifact.path)"
            }
          }
          "version=$($manifest.version)" >> $env:GITHUB_ENV
          "channel=$($manifest.channel)" >> $env:GITHUB_ENV
          "build_id=$($manifest.build_id)" >> $env:GITHUB_ENV
          "tag=$($manifest.tag_name)" >> $env:GITHUB_ENV
          "release_name=$($manifest.release_name)" >> $env:GITHUB_ENV

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: FireDM-Windows-${{ env.build_id }}
          path: |
            dist/installers/**/*${{ env.build_id }}*.exe
            dist/installers/*${{ env.build_id }}*.manifest.json
            dist/installers/**/*${{ env.build_id }}*.manifest.json
            dist/installers/**/*${{ env.build_id }}*payload.zip
            dist/portable/*${{ env.build_id }}*.zip
            dist/checksums/SHA256SUMS_${{ env.build_id }}.txt
            dist/FireDM_release_manifest_${{ env.build_id }}.json
            dist/FireDM_release_notes_${{ env.build_id }}.md
            dist/dependency-status_${{ env.build_id }}.json
            dist/licenses/license-inventory_${{ env.build_id }}.json
          if-no-files-found: error

      - name: Dry-run or publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseArgs = @(
            "scripts\release\github_release.py",
            "--manifest",
            "dist\FireDM_release_manifest_$($env:build_id).json",
            "--repo",
            $env:GITHUB_REPOSITORY
          )
          if ("${{ inputs.draft }}" -eq "false") {
            $releaseArgs += "--no-draft"
          }
          if ("${{ inputs.prerelease }}" -eq "false" -or $env:channel -eq "stable") {
            $releaseArgs += "--no-prerelease"
          } else {
            $releaseArgs += "--prerelease"
          }
          if ($env:GITHUB_REF_TYPE -eq "tag" -or "${{ inputs.publish_release }}" -eq "true") {
            $releaseArgs += "--publish"
          }
          python @releaseArgs
